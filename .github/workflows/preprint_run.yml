name: Preprint Digest

on:
  # Thursday 07:00 UTC — between Citation (Wed) and Journal Digest (Fri)
  schedule:
    - cron: "0 7 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprint-digest:
    runs-on: ubuntu-latest     # was self-hosted — fixed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Preprint Digest
        env:
          PYTHONPATH:      preprint_digest
          GOOGLE_API_KEY:  ${{ secrets.GOOGLE_API_KEY }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER:  ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: python preprint_digest/preprint_bot.py

      - name: Write bot status
        if: success()
        run: |
          mkdir -p docs
          python - <<'EOF'
          import json, datetime
          from pathlib import Path
          f = Path("docs/status.json")
          status = json.loads(f.read_text()) if f.exists() else {}
          status["preprint_digest"] = {"last_run": datetime.date.today().isoformat(), "status": "success"}
          f.write_text(json.dumps(status, indent=2))
          EOF

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprint_digest/ docs/status.json
          git diff --staged --quiet || git commit -m "preprint: $(date +%Y-%m-%d) [skip ci]"
          git push
