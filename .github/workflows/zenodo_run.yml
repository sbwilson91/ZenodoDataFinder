name: Zenodo scRNA-seq Bot

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday at 5 AM UTC
  workflow_dispatch:

jobs:
  zenodo-bot:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Activate venv
        run: echo "/home/swilson/actions-runner-env/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run Zenodo bot
        env:
          PYTHONPATH: zenodo_bot
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          LOOKBACK_PERIOD: 'week'
        run: python zenodo_bot/zenodo_bot.py
