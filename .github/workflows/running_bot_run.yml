name: Running Bot

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          PYTHONPATH:           running_bot
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GARMIN_EMAIL:         ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:      ${{ secrets.GARMIN_PASSWORD }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER:       ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
        run: python running_bot/running_bot.py

      - name: Rotate Strava refresh token if needed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f new_refresh_token.txt ]; then
            gh secret set STRAVA_REFRESH_TOKEN \
              --body "$(cat new_refresh_token.txt)" \
              --repo "${{ github.repository }}"
            rm new_refresh_token.txt
            echo "✓ STRAVA_REFRESH_TOKEN rotated"
          fi

      - name: Write bot status
        if: success()
        run: |
          mkdir -p docs
          python - <<'EOF'
          import json, datetime
          from pathlib import Path
          f = Path("docs/status.json")
          status = json.loads(f.read_text()) if f.exists() else {}
          status["running_bot"] = {"last_run": datetime.date.today().isoformat(), "status": "success"}
          f.write_text(json.dumps(status, indent=2))
          EOF

      - name: Commit report and status
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add running_bot/reports/ docs/status.json
          git diff --staged --quiet || git commit -m "run-report: $(date +%Y-%m-%d) [skip ci]"
          git push
