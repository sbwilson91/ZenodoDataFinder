# .github/workflows/weekly_digest.yml
name: Weekly Journal Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  scrape-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and summariser
        env:
          HF_API_TOKEN: ${{ secrets.HF_TOKEN }}
          # Optional: override the default model without touching code
          # HF_MODEL: "HuggingFaceH4/zephyr-7b-beta"
        run: python -m scraper.main

      - name: Commit digest to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +%Y-%m-%d)"
          git push

      - name: Read digest for email
        id: digest
        run: |
          # Find today's digest (fall back to most recent if date mismatch)
          DIGEST_FILE=$(ls digests/$(date +%Y-%m-%d)-weekly-digest.md 2>/dev/null || ls digests/*.md | tail -1)
          echo "file=$DIGEST_FILE" >> $GITHUB_OUTPUT

          # GitHub Actions output vars have a ~64KB limit — truncate just in case
          {
            echo 'body<<EOF'
            cat "$DIGEST_FILE" | head -c 50000
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Send digest email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: "Journal Digest <${{ secrets.EMAIL_SENDER }}>"
          subject: "📄 Weekly Journal Digest — $(date +%Y-%m-%d)"
          body: ${{ steps.digest.outputs.body }}
          # The .md file is also attached so you have a clean copy
          attachments: ${{ steps.digest.outputs.file }}
