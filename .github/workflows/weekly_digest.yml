# .github/workflows/weekly_digest.yml
name: Weekly Journal Digest

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and summariser
        env:
          HF_API_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m scraper.main

      - name: Commit digest to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +%Y-%m-%d)"
          git push

      - name: Read digest for email
        id: digest
        run: |
          DIGEST_FILE=$(ls digests/$(date +%Y-%m-%d)-weekly-digest.md 2>/dev/null || ls digests/*.md | tail -1)
          echo "file=$DIGEST_FILE" >> $GITHUB_OUTPUT
          python scraper/md_to_html_email.py "$DIGEST_FILE"

      - name: Send digest email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "Journal Digest <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "📄 Weekly Journal Digest — $(date +%Y-%m-%d)"
          html_body: file:///tmp/digest_email.html
          body: file:///tmp/digest_plain.txt
          attachments: ${{ steps.digest.outputs.file }}
