# .github/workflows/weekly_digest.yml
name: Weekly Journal Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  scrape-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and summariser
        env:
          HF_API_TOKEN: ${{ secrets.HF_TOKEN }}
          # Optional: override the default model without touching code
          # HF_MODEL: "HuggingFaceH4/zephyr-7b-beta"
        run: python -m scraper.main

      - name: Commit digest to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +%Y-%m-%d)"
          git push

      - name: Read digest for email
        id: digest
        run: |
          DIGEST_FILE=$(ls digests/$(date +%Y-%m-%d)-weekly-digest.md 2>/dev/null || ls digests/*.md | tail -1)
          echo "file=$DIGEST_FILE" >> $GITHUB_OUTPUT

          # Python handles both conversions — no heredoc needed
          python - "$DIGEST_FILE" << 'PEOF'
import sys, re, os
from datetime import datetime
from pathlib import Path

md_path = sys.argv[1]
md = Path(md_path).read_text(encoding='utf-8')

# ── Write HTML email ──────────────────────────────────────────────────────────
def inline(t):
    t = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', t)
    t = re.sub(r'`([^`]+)`', r'<code>\1</code>', t)
    t = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<a href="\2">\1</a>', t)
    return t

def parse(md):
    out, in_list = [], False
    def cl():
        nonlocal in_list
        if in_list: out.append('</ul>'); in_list = False
    for line in md.splitlines():
        s = line.strip()
        if s.startswith('# ') and not s.startswith('##'): cl(); out.append(f'<h1>{inline(s[2:])}</h1>')
        elif s.startswith('## ') and not s.startswith('###'): cl(); out.append(f'<h2>{inline(s[3:])}</h2>')
        elif s.startswith('### '): cl(); out.append(f'<h3>{inline(s[4:])}</h3>')
        elif s == '---': cl(); out.append('<hr>')
        elif s.startswith('> '): cl(); out.append(f'<blockquote>{inline(s[2:])}</blockquote>')
        elif s.startswith('- '):
            if not in_list: out.append('<ul>'); in_list = True
            out.append(f'<li>{inline(s[2:])}</li>')
        elif s == '': cl()
        else:
            cl()
            css = 'meta' if re.match(r'^\*\*[^*]+\*\*', s) else ''
            if s: out.append(f'<p class="{css}">{inline(s)}</p>')
    cl()
    return '\n'.join(out)

html = f"""<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{{box-sizing:border-box;margin:0;padding:0}}
body{{background:#f4f1ec;font-family:Georgia,serif;font-size:16px;line-height:1.7;color:#1a1a1a;padding:32px 16px 64px}}
.wrapper{{max-width:700px;margin:0 auto}}
.masthead{{border-top:4px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:28px 0 20px;margin-bottom:40px}}
.label{{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#666;margin-bottom:8px}}
.title{{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#444}}
.date{{font-family:'Courier New',monospace;font-size:11px;color:#888;margin-top:6px}}
h1{{font-size:28px;font-weight:normal;letter-spacing:-.02em;line-height:1.2;margin:48px 0 16px;padding-bottom:12px;border-bottom:2px solid #1a1a1a}}
h2{{font-size:11px;font-family:'Courier New',monospace;font-weight:normal;letter-spacing:.2em;text-transform:uppercase;color:#fff;background:#1a1a1a;display:inline-block;padding:4px 12px;margin:40px 0 20px}}
h3{{font-size:19px;font-weight:normal;line-height:1.35;color:#1a1a1a;margin:28px 0 10px}}
p{{margin-bottom:10px;color:#2a2a2a}}
p.meta{{font-family:'Courier New',monospace;font-size:12px;color:#555;margin:6px 0}}
blockquote{{border-left:3px solid #c8b89a;margin:14px 0;padding:10px 16px;background:#faf8f5;font-style:italic;color:#3a3a3a;font-size:15px}}
ul{{padding-left:0;list-style:none;margin:8px 0}}
ul li{{font-family:'Courier New',monospace;font-size:12px;color:#444;padding:3px 0 3px 16px;position:relative}}
ul li::before{{content:'→';position:absolute;left:0;color:#c8b89a}}
a{{color:#1a1a1a;text-decoration-color:#c8b89a}}
code{{font-family:'Courier New',monospace;font-size:12px;background:#f0ede8;padding:1px 5px;border-radius:2px}}
hr{{border:none;border-top:1px solid #ddd;margin:32px 0}}
.footer{{margin-top:56px;padding-top:20px;border-top:1px solid #ccc;font-family:'Courier New',monospace;font-size:11px;color:#888}}
</style></head><body><div class="wrapper">
<div class="masthead">
  <div class="label">Automated Research Intelligence</div>
  <div class="title">Weekly Journal Digest</div>
  <div class="date">{datetime.now().strftime('%A, %-d %B %Y')}</div>
</div>
{parse(md)}
<div class="footer">Generated automatically · Nature · Science · Cell · Cell Stem Cell · Stem Cell Reports · Nature Biotechnology · Nature Methods · Bioinformatics</div>
</div></body></html>"""

Path('/tmp/digest_email.html').write_text(html, encoding='utf-8')
print("HTML email written → /tmp/digest_email.html")

# ── Write plain text (truncated) to a temp file ───────────────────────────────
Path('/tmp/digest_plain.txt').write_text(md[:50000], encoding='utf-8')

PEOF
          echo "html_file=/tmp/digest_email.html" >> $GITHUB_OUTPUT
          echo "text_file=/tmp/digest_plain.txt"  >> $GITHUB_OUTPUT

      - name: Send digest email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "Journal Digest <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "📄 Weekly Journal Digest — $(date +%Y-%m-%d)"
          html_body: file:///tmp/digest_email.html
          body: file:///tmp/digest_plain.txt
          attachments: ${{ steps.digest.outputs.file }}
