# .github/workflows/weekly_digest.yml
name: Weekly Journal Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  scrape-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and summariser
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          # Optional: override the default model without touching code
          # HF_MODEL: "HuggingFaceH4/zephyr-7b-beta"
        run: python -m scraper.main

      - name: Commit digest to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +%Y-%m-%d)"
          git push
