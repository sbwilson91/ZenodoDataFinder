name: Weekly Journal Digest

on:
  # Friday 07:00 UTC — literature roundup heading into the weekend
  schedule:
    - cron: "0 7 * * 5"
  workflow_dispatch:

jobs:
  journal-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Journal Digest
        env:
          # GOOGLE_API_KEY replaces the old HF_API_TOKEN / HF_TOKEN
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          cd journal_digest
          python -m scraper.main

      - name: Commit digests and docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal_digest/digests/ journal_digest/trends/ docs/
          git diff --staged --quiet || git commit -m "digest: $(date +%Y-%m-%d) weekly [skip ci]"
          git push
