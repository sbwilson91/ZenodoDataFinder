name: Update Athlete Context

on:
  # 1st of every month at 09:00 UTC — after enough weekly reports have accumulated
  schedule:
    - cron: "0 9 1 * *"

  # Also allow manual trigger any time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update athlete context
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd running_bot
          python update_context.py

      - name: Commit updated context
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add running_bot/athlete_context.md
          git diff --staged --quiet && echo "No changes to context" && exit 0
          git commit -m "context: monthly athlete context update $(date +%Y-%m-%d) [skip ci]"
          git push
