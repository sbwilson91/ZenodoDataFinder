# config.yaml
# Each journal entry needs its RSS URL. Most journals have several
# feeds (e.g. by section), so we pick the most relevant ones.

journals:
  - name: "Nature"
    rss: "https://www.nature.com/nature.rss"
    category: "Multidisciplinary"

  - name: "Science"
    rss: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=science"
    category: "Multidisciplinary"

  - name: "Cell"
    rss: "https://www.cell.com/cell/rss/current"
    category: "Life Sciences"

  - name: "Cell Stem Cell"
    rss: "https://www.cell.com/cell-stem-cell/rss/current"
    category: "Stem Cell Biology"

  - name: "Stem Cell Reports"
    rss: "https://www.cell.com/stem-cell-reports/rss/current"
    category: "Stem Cell Biology"

  - name: "Nature Biotechnology"
    rss: "https://www.nature.com/nbt.rss"
    category: "Biotechnology"

  - name: "Nature Methods"
    rss: "https://www.nature.com/nmeth.rss"
    category: "Methods & Tools"

  - name: "Bioinformatics"
    rss: "https://academic.oup.com/rss/site_5168/3013.xml"
    category: "Computational Biology"

# How many days back to look (7 = last week's publications)
lookback_days: 7

# Only include these article types (filters out editorials, news, etc.)
include_types:
  - "research-article"
  - "letter"
  - "article"
  - "resource"